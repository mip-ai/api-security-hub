name: Update API Security News

on:
  schedule:
    # JST 6:00 = UTC 21:00 (前日)
    # JST 12:00 = UTC 3:00
    # JST 18:00 = UTC 9:00
    # JST 0:00 = UTC 15:00
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix scripts

      - name: Fetch API Security News
        run: node scripts/fetch-news.js

      - name: Fetch Vendor Blog Posts
        run: node scripts/fetch-vendor-blogs.js

      - name: Build i18n pages
        run: node scripts/build-i18n.js

      - name: Commit and Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/vendor-blogs.json en/ ja/ es/ pt/ fr/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update API security news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: fetch-news
    if: needs.fetch-news.outputs.has_changes == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
